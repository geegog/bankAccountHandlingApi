databaseChangeLog:
  - changeSet:
      id: 0.0.3
      author: onuchenyo.idoko@gmail.com
      changes:
        - createTable:
            tableName: transactions
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: account_number
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: source_currency
                  type: varchar(3)
                  constraints:
                    nullable: false
              - column:
                  name: source_amount
                  type: decimal(19, 2)
                  constraints:
                    nullable: false
              - column:
                  name: target_currency
                  type: varchar(3)
                  constraints:
                    nullable: true
              - column:
                  name: target_amount
                  type: decimal(19, 2)
                  constraints:
                    nullable: true
              - column:
                  name: transaction_type
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: reference
                  type: varchar(50)
                  constraints:
                    nullable: true
              - column:
                  name: exchange_rate
                  type: decimal(3, 2)
                  constraints:
                    nullable: true
              - column:
                  name: created
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: updated
                  type: timestamp
                  constraints:
                    nullable: true
