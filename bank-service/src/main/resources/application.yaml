spring:
  application:
    name: bank-service

  datasource:
    url: jdbc:h2:mem:bankdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  liquibase:
    # Forces Liquibase to automatically execute migrations when the application starts up
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml

  jpa:
    show-sql: true
    hibernate:
      # CRITICAL: 'validate' makes Hibernate double-check that your @Entity structures
      # perfectly match the tables created by your Liquibase scripts without altering them
      ddl-auto: validate

api:
  version: v1
  url:
    prefix: /api/

security:
  jwt:
    header: Authorization
    prefix: Bearer
    secret: qsH3pzEcQeEUbkQNVIVlItHWgBwAIYoPZdK0v8UQCGP
    login: ${api.url.prefix}${api.version}/auth/token
    expiration: 86400000

